version: '3.8'

services:
  classpulse-frontend:
    container_name: classpulse-frontend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    restart: unless-stopped
    networks:
      - classpulse-network
    depends_on:
      - n8n

  n8n:
    container_name: classpulse-n8n
    build:
      context: .
      dockerfile: Dockerfile.n8n
    ports:
      - "5678:5678"
    env_file:
      - .env.local
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_LISTEN_ADDRESS=0.0.0.0
      - WEBHOOK_URL=http://localhost:5678/
      # Optional: basic auth to protect the n8n UI
      # - N8N_BASIC_AUTH_ACTIVE=true
      # - N8N_BASIC_AUTH_USER=admin
      # - N8N_BASIC_AUTH_PASSWORD=changeme
    volumes:
      - n8n_data:/data
    restart: unless-stopped
    networks:
      - classpulse-network

networks:
  classpulse-network:
    driver: bridge

volumes:
  n8n_data:
    driver: local
